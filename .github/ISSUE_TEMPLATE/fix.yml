name: Fix
description: 작은 코드 수정이나 버그 수정을 기록할 때 사용하세요.
title: "[FIX] "
labels: ["fix", "bug", "code"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        🛠️ 수정 내용  
        어떤 부분을 수정했나요?

  - type: textarea
    id: fix_description
    attributes:
      label: 수정 내용
      description: 수정한 내용을 자세히 작성해주세요.
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ❓ 수정 이유  
        왜 이 수정을 했나요?

  - type: textarea
    id: fix_reason
    attributes:
      label: 수정 이유
      description: 수정한 이유를 설명해주세요.
    validations:
      required: true

  - type: input
    id: related_issue
    attributes:
      label: 관련 이슈 번호 (선택)
      placeholder: #123